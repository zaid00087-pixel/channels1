<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار الجزيرة</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --card: #141b2d;
            --text: #e0e0e0;
            --accent: #00b4d8;
            --muted: #8892a4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            line-height: 1.6;
        }
        .header {
            background: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid #1e2a3a;
        }
        .header h1 { font-size: 1.5rem; color: var(--accent); margin: 0; }
        .header .source { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
        .loading, .error {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }
        .news-list { display: flex; flex-direction: column; gap: 12px; }
        .news-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e2a3a;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .news-card:active { border-color: var(--accent); }
        .news-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #1a1f30;
        }
        .news-card .card-body { padding: 12px 14px; }
        .news-card .card-body h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #ffffff;
            line-height: 1.4;
        }
        .news-card .card-body .desc {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .news-card .card-body .date {
            font-size: 0.7rem;
            color: #5a6680;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>آخر أخبار الجزيرة</h1>
        <div class="source">يتم التحديث تلقائياً</div>
    </div>

    <div class="loading" id="loading">⏳ جارٍ تحميل الأخبار...</div>
    <div class="error" id="error" style="display:none;">❌ لا يمكن تحميل الأخبار حالياً</div>
    <div class="news-list" id="newsList"></div>

    <script>
        // رابط وسيط CORS لجلب RSS مباشرة
        var CORS_PROXY = 'https://api.allorigins.win/raw?url=';
        var RSS_FEED = 'https://www.aljazeera.net/xml/rss';
        var API_URL = CORS_PROXY + encodeURIComponent(RSS_FEED);

        function parseRSS(xmlText) {
            var parser = new DOMParser();
            var xmlDoc = parser.parseFromString(xmlText, "text/xml");
            var items = xmlDoc.querySelectorAll('item');
            var newsList = [];
            items.forEach(function(item) {
                var title = item.querySelector('title')?.textContent || '';
                var link = item.querySelector('link')?.textContent || '';
                var description = item.querySelector('description')?.textContent || '';
                var pubDate = item.querySelector('pubDate')?.textContent || '';
                // استخراج الصورة من الوسم <enclosure> أو <media:content>
                var enclosure = item.querySelector('enclosure');
                var image = enclosure ? enclosure.getAttribute('url') : '';
                if (!image) {
                    var mediaContent = item.querySelector('media\\:content, content');
                    if (mediaContent) image = mediaContent.getAttribute('url');
                }
                newsList.push({
                    title: title,
                    link: link,
                    description: description,
                    pubDate: pubDate,
                    image: image
                });
            });
            return newsList;
        }

        function loadNews() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_URL, true);
            xhr.onload = function() {
                var loading = document.getElementById('loading');
                var error = document.getElementById('error');
                var list = document.getElementById('newsList');
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var newsData = parseRSS(xhr.responseText);
                        if (newsData.length > 0) {
                            loading.style.display = 'none';
                            newsData.forEach(function(item) {
                                var card = document.createElement('div');
                                card.className = 'news-card';
                                card.onclick = function() {
                                    window.open(item.link, '_blank');
                                };
                                var imgHtml = '';
                                if (item.image) {
                                    imgHtml = '<img src="' + item.image + '" alt="' + item.title + '" onerror="this.style.display=\'none\'">';
                                }
                                var desc = (item.description || '').substring(0, 120);
                                var dateStr = '';
                                try {
                                    dateStr = new Date(item.pubDate).toLocaleDateString('ar-SA');
                                } catch(e) {}
                                card.innerHTML = imgHtml +
                                    '<div class="card-body">' +
                                    '<h2>' + item.title + '</h2>' +
                                    '<div class="desc">' + desc + '...</div>' +
                                    '<div class="date">📅 ' + dateStr + '</div>' +
                                    '</div>';
                                list.appendChild(card);
                            });
                        } else {
                            loading.style.display = 'none';
                            error.style.display = 'block';
                        }
                    } catch(e) {
                        loading.style.display = 'none';
                        error.style.display = 'block';
                    }
                } else {
                    loading.style.display = 'none';
                    error.style.display = 'block';
                }
            };
            xhr.onerror = function() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            };
            xhr.send();
        }

        loadNews();
    </script>
</body>
</html>
