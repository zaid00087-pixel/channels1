
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار الجزيرة</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --card: #141b2d;
            --text: #e0e0e0;
            --accent: #00b4d8;
            --muted: #8892a4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            line-height: 1.6;
        }
        .header {
            background: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid #1e2a3a;
        }
        .header h1 { font-size: 1.5rem; color: var(--accent); margin: 0; }
        .news-list { display: flex; flex-direction: column; gap: 12px; }
        .news-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e2a3a;
            cursor: pointer;
        }
        .news-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #1a1f30;
        }
        .news-card .card-body { padding: 12px 14px; }
        .news-card .card-body h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #ffffff;
        }
        .news-card .card-body .desc {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .news-card .card-body .date {
            font-size: 0.7rem;
            color: #5a6680;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>آخر أخبار الجزيرة</h1>
    </div>
    <div class="news-list" id="newsList"></div>

    <script>
        // رابط ملف JSON الموجود في نفس المجلد
        const JSON_URL = 'aljazeera.json';

        function displayNews(data) {
            const list = document.getElementById('newsList');
            list.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.onclick = () => window.open(item.link, '_blank');

                let imgHtml = '';
                if (item.image) {
                    imgHtml = `<img src="${item.image}" alt="${item.title}" onerror="this.style.display='none'">`;
                }
                const desc = (item.description || '').substring(0, 120);
                let dateStr = '';
                try {
                    dateStr = new Date(item.pubDate).toLocaleDateString('ar-SA');
                } catch(e) {}

                card.innerHTML = imgHtml + `
                    <div class="card-body">
                        <h2>${item.title}</h2>
                        <div class="desc">${desc}...</div>
                        <div class="date">📅 ${dateStr}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // جلب البيانات من ملف JSON محلي
        fetch(JSON_URL)
            .then(response => response.json())
            .then(data => displayNews(data))
            .catch(() => {
                document.getElementById('newsList').innerHTML = '<p style="color:#aaa;text-align:center">❌ لا يمكن تحميل الأخبار حالياً</p>';
            });
    </script>
</body>
</html>
