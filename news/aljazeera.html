<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار الجزيرة</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --card: #141b2d;
            --text: #e0e0e0;
            --accent: #00b4d8;
            --muted: #8892a4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
        }
        .header {
            background: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .header h1 { font-size: 1.5rem; color: var(--accent); }
        .news-list { display: flex; flex-direction: column; gap: 12px; }
        .news-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #1e2a3a;
        }
        .news-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #1a1f30;
        }
        .news-card .card-body { padding: 12px; }
        .news-card .card-body h2 {
            font-size: 1rem;
            color: #fff;
            margin-bottom: 6px;
        }
        .news-card .card-body .desc {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .news-card .card-body .date {
            font-size: 0.7rem;
            color: #5a6680;
        }
        .error { text-align: center; color: var(--muted); padding: 40px; }
    </style>
</head>
<body>
    <div class="header"><h1>آخر أخبار الجزيرة</h1></div>
    <div class="news-list" id="newsList">
        <div class="error">⏳ جارٍ تحميل الأخبار...</div>
    </div>

    <script>
        const RSS_URL = 'https://www.aljazeera.net/xml/rss';
        const PROXY = 'https://corsproxy.io/?';  // وسيط CORS مجاني

        async function fetchAndParse() {
            const list = document.getElementById('newsList');
            try {
                const response = await fetch(PROXY + encodeURIComponent(RSS_URL));
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                const items = xml.querySelectorAll('item');
                
                list.innerHTML = '';
                if (items.length === 0) {
                    list.innerHTML = '<div class="error">❌ لا توجد أخبار</div>';
                    return;
                }

                items.forEach(item => {
                    const title = item.querySelector('title')?.textContent || '';
                    const link = item.querySelector('link')?.textContent || '';
                    const desc = (item.querySelector('description')?.textContent || '').substring(0, 120);
                    const pubDate = item.querySelector('pubDate')?.textContent || '';
                    const enclosure = item.querySelector('enclosure');
                    const imgSrc = enclosure ? enclosure.getAttribute('url') : '';

                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.onclick = () => window.open(link, '_blank');

                    card.innerHTML = `
                        ${imgSrc ? `<img src="${imgSrc}" alt="${title}" onerror="this.style.display='none'">` : ''}
                        <div class="card-body">
                            <h2>${title}</h2>
                            <div class="desc">${desc}...</div>
                            <div class="date">📅 ${new Date(pubDate).toLocaleDateString('ar-SA')}</div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                list.innerHTML = '<div class="error">❌ لا يمكن تحميل الأخبار حالياً</div>';
            }
        }

        fetchAndParse();
    </script>
</body>
</html>
